stages:
  - test

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

default:
  image: python:3.12-slim
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_DB: "cyber_copilot"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: ""
  POSTGRES_HOST_AUTH_METHOD: "trust"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DSN: "postgresql://postgres@postgres:5432/cyber_copilot"
  DATABASE_URL: "postgresql://postgres@postgres:5432/cyber_copilot"
  AGENT_AUTH_MODE: "mock"
  AGENT_USE_MCP_CYBER_CONTEXT: "0"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

pytest:
  stage: test
  services:
    - name: postgres:17-alpine
      alias: postgres
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - >
      python - <<'PY'
      import os
      import time
      import psycopg

      dsn = os.environ["POSTGRES_DSN"]
      deadline = time.time() + 60
      while True:
          try:
              with psycopg.connect(dsn) as conn:
                  with conn.cursor() as cur:
                      cur.execute("select 1")
                      print("Postgres ready")
              break
          except Exception as exc:
              if time.time() >= deadline:
                  raise SystemExit(f"Postgres did not become ready in time: {exc}")
              time.sleep(2)
      PY
  script:
    - python -m pytest tests -q --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
    paths:
      - pytest-report.xml
