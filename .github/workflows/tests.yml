name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cyber_copilot
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cyber_copilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: cyber_copilot
      POSTGRES_USER: postgres
      POSTGRES_DSN: postgresql://postgres@127.0.0.1:5432/cyber_copilot
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/cyber_copilot
      AGENT_AUTH_MODE: mock
      AGENT_USE_MCP_CYBER_CONTEXT: "0"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import os
          import time
          import psycopg

          dsn = os.environ["POSTGRES_DSN"]
          deadline = time.time() + 60
          while True:
              try:
                  with psycopg.connect(dsn) as conn:
                      with conn.cursor() as cur:
                          cur.execute("select 1")
                  print("Postgres ready")
                  break
              except Exception as exc:
                  if time.time() >= deadline:
                      raise SystemExit(f"Postgres did not become ready in time: {exc}")
                  time.sleep(2)
          PY

      - name: Run test suite
        run: python -m pytest tests -q --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml
